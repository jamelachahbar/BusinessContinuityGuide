# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: boltplan
metadata:
  template: boltplan@1.0.0
services:
  web:
    project: ./web-app
    dist: dist
    language: ts
    host: staticwebapp
hooks:
  predeploy:
    windows:
      shell: pwsh
      run: |
        $mode = if ($env:DEPLOYMENT_MODE) { $env:DEPLOYMENT_MODE } else { 'public' }
        $src  = "web-app/staticwebapp.$mode.config.json"
        if (Test-Path $src) {
          Copy-Item $src "web-app/dist/staticwebapp.config.json" -Force
          Write-Host "Applied $mode auth config to dist."
        } else {
          Write-Host "No staticwebapp config for mode '$mode' — skipping."
        }
    posix:
      shell: sh
      run: |
        MODE="${DEPLOYMENT_MODE:-public}"
        SRC="web-app/staticwebapp.${MODE}.config.json"
        if [ -f "$SRC" ]; then
          cp "$SRC" "web-app/dist/staticwebapp.config.json"
          echo "Applied $MODE auth config to dist."
        else
          echo "No staticwebapp config for mode '$MODE' — skipping."
        fi
